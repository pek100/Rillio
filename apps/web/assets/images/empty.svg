<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Nothing here yet">
  <!-- The rill alone: one living accent line meandering through, fading in from
       the left and out past the right. "The stream has not reached here yet." -->
  <defs>
    <linearGradient id="rl-empty-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFA033" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#FFA033" stop-opacity="0.9"/>
      <stop offset="0.72" stop-color="#FFA033" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFA033" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <path d="M10 103 C46 93, 68 112, 100 102 S152 94, 190 103"
        stroke="url(#rl-empty-fade)" stroke-width="3" stroke-linecap="round"/>
</svg>
