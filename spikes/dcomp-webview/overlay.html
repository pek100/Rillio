<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /* Transparent body -> the DComp video layer (teal) must show through
     everywhere this UI is not painting. This is the whole point of the spike. */
  html, body {
    margin: 0; height: 100%; background: transparent;
    font-family: "Segoe UI", system-ui, sans-serif; color: #fff;
    overflow: hidden; user-select: none;
  }
  #hud {
    position: absolute; left: 24px; top: 24px;
    padding: 18px 22px; border-radius: 14px;
    background: rgba(12, 16, 24, 0.55);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.12);
  }
  h1 { margin: 0 0 6px; font-size: 18px; font-weight: 600; letter-spacing: .2px; }
  .sub { margin: 0 0 14px; font-size: 12px; opacity: .7; }
  .row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  button {
    font: inherit; font-size: 14px; color: #06202a; cursor: pointer;
    background: #22d3ee; border: 0; border-radius: 9px; padding: 9px 16px;
    transition: transform .06s ease, background .15s ease;
  }
  button:active { transform: scale(0.96); }
  #count { font-variant-numeric: tabular-nums; font-size: 15px; }
  #clock { font-variant-numeric: tabular-nums; opacity: .8; font-size: 13px; }
  /* A GPU-cheap moving bar to eyeball composite smoothness at a glance. */
  #sweep {
    position: absolute; left: 0; bottom: 0; height: 6px; width: 220px;
    background: linear-gradient(90deg, transparent, #22d3ee, transparent);
    animation: slide 2.4s linear infinite;
  }
  @keyframes slide { from { transform: translateX(-220px); } to { transform: translateX(100vw); } }
  /* Center crosshair proves the transparent region is truly see-through. */
  #hole {
    position: absolute; left: 50%; top: 50%; width: 160px; height: 160px;
    transform: translate(-50%,-50%); border: 2px dashed rgba(255,255,255,.5);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; text-align: center; opacity: .8;
  }
</style>
</head>
<body>
  <div id="hud">
    <h1>DComp overlay — Stage 1</h1>
    <p class="sub">Transparent WebView2, GPU-composited over a D3D11 teal layer.</p>
    <div class="row">
      <button id="btn">Click me</button>
      <span id="count">clicks: 0</span>
    </div>
    <div class="row"><span id="clock">--:--:--</span></div>
  </div>
  <div id="hole">teal shows<br/>through here</div>
  <div id="sweep"></div>
  <script>
    let n = 0;
    const btn = document.getElementById('btn');
    const count = document.getElementById('count');
    const hues = ['#22d3ee', '#f472b6', '#a3e635', '#fbbf24', '#c084fc'];
    btn.addEventListener('click', () => {
      n++;
      count.textContent = 'clicks: ' + n;
      btn.style.background = hues[n % hues.length];
    });
    const clock = document.getElementById('clock');
    setInterval(() => {
      const d = new Date();
      clock.textContent = d.toLocaleTimeString();
    }, 250);
  </script>
</body>
</html>
